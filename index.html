<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de viajes Mi Colombia</title>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <script src="main.js"></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="inicio">
    <h1>¡Agenda tus proximos viajes y lleva el control contigo!</h1>
    <img src="img/logo.png" alt="Mi Colombia" width="200">
    <button onclick="close">Volver</button>
    </div> 
    <div class="ciudades">
        <p>Selecciona el aeropuerto de Salida</p>
        <select class="Salida" id="aeropuertos"></select>
        <p>Selecciona el aeropuerto de llegada</p>
        <select class="llegada" id="aeropuertol"></select>
        <button onclick="limpiarMapa()">Limpiar</button>
    </div>
    <div id="mapa" style="width: 90%;height:600px;position:absolute;margin: 10px;position:relative;left: 4%;"></div> 
</body>
</html>
