<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Mi Colombia</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="background">

        <div class="login-box">



            <img src="img/logo.png" alt="Mi Colombia" class="logo">

            <h1>Iniciar Sesión</h1>

            <p>
                Ingresa tus credenciales para acceder a tu cuenta
            </p>



            <div class="input-group">

                <label>
                    Correo electrónico
                </label>

                <div class="input-box">

                    <i class="fa-regular fa-envelope"></i>

                    <input type="email" id="correo" placeholder="Ingresa tu correo electrónico">

                </div>

            </div>


            <div class="input-group">

                <label>
                    Contraseña
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password" placeholder="Ingresa tu contraseña" id="password">

                    <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>

                </div>

            </div>


            <div class="options">

                <label class="remember">

                    <input type="checkbox">

                    Recordarme

                </label>

                <a href="#">
                    ¿Olvidaste tu contraseña?
                </a>

            </div>


            <button type="button" class="login-btn" onclick="iniciarSesion()">
                <i class="fa-solid fa-right-to-bracket"></i>
                Iniciar Sesión
            </button>


            <div class="register">

                ¿No tienes una cuenta?

                <a href="#">
                    Regístrate aquí
                </a>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
