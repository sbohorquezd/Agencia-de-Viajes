<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Itinerarios - Mi Colombia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/itinerarios.css">
</head>

<body>

    <div class="navbar">
        <div class="logo-area">
            <img src="img/logo.png" alt="Mi Colombia">
            <h2>Viajes Mi Colombia</h2>
        </div>
        <ul class="menu">
            <li><a href="index.html">Mapa de Vuelos</a></li>
        </ul>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="titulo">
        <h1>Gestión de Itinerarios</h1>
    </div>

    <div class="contenedor-itinerarios">

        <div id="listaItinerarios">
            <p>Cargando...</p>
        </div>

    </div>

    <div id="modalEditar" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Editar Itinerario</h2>
                <button class="btn-cerrar" onclick="cerrarEditar()">✕</button>
            </div>
            <div class="form-editar">
                <input type="hidden" id="editId">
                <div class="campo-editar">
                    <label>Origen</label>
                    <input type="text" id="editSalida">
                </div>
                <div class="campo-editar">
                    <label>Destino</label>
                    <input type="text" id="editLlegada">
                </div>
                <div class="campo-editar">
                    <label>Fecha Ida</label>
                    <input type="date" id="editFechaInicio">
                </div>
                <div class="campo-editar">
                    <label>Fecha Vuelta</label>
                    <input type="date" id="editFechaFin">
                </div>
                <div class="campo-editar">
                    <label>Duración (horas)</label>
                    <input type="number" id="editDuracion" step="0.1">
                </div>
                <div class="botones-editar">
                    <button onclick="cerrarEditar()">Cancelar</button>
                    <button class="btn-guardar" onclick="guardarEdicion()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/itinerario.js"></script>
    <script>
        function cerrarSesion() {
            sessionStorage.clear();
            fetch("http://localhost:8080/logout", { method: "POST" });
            window.location.href = "login.html";
        }

        cargarItinerarios();
    </script>

</body>
</html>
